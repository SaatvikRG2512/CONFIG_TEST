<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Car Configurator</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        width: 100vw;
        overflow-x: hidden;
        font-size: 16px;
        background: #181b21;
        color: #f8fafc;
      }

      .app-shell {
        display: grid;
        gap: 24px;
        width: 100vw;
        max-width: 100vw;
        margin: 0 auto;
        padding: 24px 32px 32px;
        overflow: hidden;
      }

      .topbar {
        display: flex;
        justify-content: flex-start;
        align-items: center;
        gap: 16px;
      }

      .topbar .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #f8fafc;
      }

      .topbar nav {
        display: none !important;
      }

      .topbar a {
        color: rgba(248, 250, 252, 0.78);
        text-decoration: none;
        font-size: 0.95rem;
        transition: color 0.2s ease;
      }

      .topbar a:hover {
        color: #f8fafc;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
        gap: 42px;
        align-items: center;
        padding: 12px 0 0;
        min-height: calc(100vh - 80px);
        width: 100%;
      }
      .hero-visual {
        touch-action: pan-y;
      }
      .hero-visual img {
        width: auto;
        max-width: 100%;
        max-height: 680px;
        height: auto;
        z-index: 1;
        user-select: none;
        -webkit-user-drag: none;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
      }

      .hero-intro {
        display: grid;
        gap: 16px;
      }

      .hero-intro span {
        text-transform: uppercase;
        letter-spacing: 0.18em;
        font-size: 0.85rem;
        color: #f87171;
        font-weight: 700;
      }

      .hero-intro h1 {
        margin: 0;
        font-size: clamp(3rem, 5vw, 4.6rem);
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      .hero-intro .price {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: #d1d5db;
        font-size: 1.05rem;
      }

      .hero-intro .price strong {
        color: #f8fafc;
      }

      .hero-intro .actions {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
        margin-top: 16px;
      }

      .button {
        border: 0;
        border-radius: 999px;
        padding: 14px 24px;
        font-size: 0.95rem;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .button.primary {
        background: #dc2626;
        color: white;
      }

      .button.secondary {
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.12);
        color: #f8fafc;
      }

      .button:hover {
        transform: translateY(-1px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.18);
      }

      .hero-visual {
        position: relative;
        display: grid;
        place-items: center;
        padding: 20px 20px 40px;
        min-height: 780px;
        width: 100%;
        background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 40px;
        box-shadow: 0 80px 130px rgba(0, 0, 0, 0.32);
        overflow: hidden;
        user-select: none;
        -webkit-user-drag: none;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
      }

      .hero-visual::before {
        content: "";
        position: absolute;
        inset: 16px 0 0;
        background: radial-gradient(circle at center, rgba(255,255,255,0.06), transparent 36%);
        pointer-events: none;
      }

      .hero-visual img {
        width: auto;
        max-width: 92%;
        max-height: 780px;
        height: auto;
        z-index: 1;
        user-select: none;
        -webkit-user-drag: none;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
      }

      .drag-badge {
        position: absolute;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%);
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 14px 24px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.92);
        color: #f8fafc;
        font-size: 0.95rem;
        border: 1px solid rgba(255,255,255,0.08);
        z-index: 2;
        user-select: none;
      }

      .drag-badge::before {
        content: "⟲";
        display: inline-flex;
        width: 26px;
        height: 26px;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        background: rgba(255,255,255,0.08);
      }

      .bottom-panel {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-top: 24px;
      }

      .bottom-panel .swatch-label {
        color: #d1d5db;
        font-size: 0.95rem;
        letter-spacing: 0.08em;
      }

      .swatch-grid {
        display: flex;
        gap: 12px;
      }

      .swatch {
        width: 52px;
        height: 52px;
        border-radius: 14px;
        border: 2px solid transparent;
        cursor: pointer;
        transition: transform 0.2s ease, border-color 0.2s ease;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.16);
      }

      .swatch.active {
        border-color: #f8fafc;
        transform: scale(1.03);
      }

      .swatch:nth-child(1) {
        background: #f8fafc;
        border: 2px solid rgba(255,255,255,0.75);
      }
      .swatch:nth-child(2) {
        background: #102347;
      }
      .swatch:nth-child(3) {
        background: linear-gradient(135deg, #b91c1c 0%, #991b1b 100%);
      }

      .hero-intro .location {
        display: inline-flex;
        align-items: center;
        justify-content: space-between;
        width: 180px;
        padding: 12px 16px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.12);
        background: rgba(255,255,255,0.04);
        color: #f8fafc;
        gap: 8px;
        font-size: 0.95rem;
      }

      .hero-intro .location::after {
        content: "▾";
        font-size: 0.7rem;
        opacity: 0.75;
      }

      @media (max-width: 1100px) {
        .hero {
          grid-template-columns: 1fr;
          text-align: center;
          min-height: auto;
        }

        .hero-intro {
          justify-items: center;
          margin: 0 auto;
          max-width: 560px;
        }

        .hero-intro .actions,
        .bottom-panel {
          justify-content: center;
        }

        .hero-visual {
          min-height: 560px;
          padding: 18px;
          border-radius: 30px;
        }

        .drag-badge {
          bottom: 18px;
          padding: 12px 18px;
        }
      }

      @media (max-width: 700px) {
        .app-shell {
          padding: 18px 18px 24px;
          gap: 18px;
        }

        .hero {
          gap: 24px;
        }

        .hero-intro h1 {
          font-size: clamp(2.4rem, 10vw, 3.2rem);
        }

        .hero-intro .price {
          font-size: 1rem;
        }

        .hero-visual {
          min-height: 420px;
          box-shadow: 0 36px 60px rgba(0, 0, 0, 0.28);
        }

        .hero-visual img {
          max-height: 420px;
        }

        .bottom-panel {
          flex-direction: column;
          align-items: center;
          gap: 12px;
        }

        .swatch {
          width: 44px;
          height: 44px;
        }

        .drag-badge {
          bottom: 12px;
          padding: 10px 14px;
          font-size: 0.85rem;
        }
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
      }

      .color-panel {
        margin-bottom: 18px;
        padding: 14px;
        border-radius: 16px;
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(148, 163, 184, 0.2);
      }

      .panel-label {
        display: inline-block;
        margin-bottom: 10px;
        font-size: 0.95rem;
        color: #e2e8f0;
        font-weight: 600;
      }

      .swatch {
        width: 42px;
        height: 42px;
        border: 2px solid transparent;
        border-radius: 50%;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.25);
      }

      .swatch:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(15, 23, 42, 0.2);
      }

      .swatch.active {
        border-color: #f8fafc;
        transform: scale(1.05);
      }

      .rotation-panel {
        display: grid;
        gap: 10px;
        width: 100%;
        margin-top: 16px;
      }

      .rotation-panel label {
        font-size: 0.95rem;
        color: #4b5563;
        font-weight: 600;
      }

      input[type="range"] {
        width: 100%;
        accent-color: #111827;
        cursor: pointer;
      }

      .preview {
        display: grid;
        gap: 18px;
        justify-items: center;
      }

      .preview img {
        width: min(100%, 680px);
        height: auto;
        border-radius: 24px;
        background: #f8fafc;
        padding: 18px;
      }

      .legend {
        color: #6b7280;
        font-size: 0.95rem;
      }

      .side-panel {
        display: grid;
        gap: 20px;
      }

      .side-panel .panel-card {
        background: white;
        padding: 24px;
        border-radius: 24px;
        border: 1px solid #e5e7eb;
      }

      .panel-card h2 {
        margin: 0 0 14px;
        font-size: 1.1rem;
        letter-spacing: 0.02em;
      }

      .panel-card p {
        margin: 0 0 18px;
        color: #6b7280;
      }

      .panel-card .controls {
        gap: 12px;
      }

      .panel-card .swatch {
        width: 68px;
        height: 68px;
        border-width: 3px;
      }

      .panel-card .swatch.active {
        border-color: #111827;
      }

      .legend {
        color: #cbd5e1;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">NEXA</div>
        <nav aria-label="Main navigation">
          <a href="#">Product Details</a>
          <a href="#">Specifications</a>
          <a href="#">FAQ</a>
          <a href="#">Book A Test Ride</a>
          <a href="#">EMI Calculator</a>
        </nav>
      </header>

      <section class="hero">
        <div class="hero-intro">
          <span>This is a sample proof of concept (POC) showcasing a functional 3D configurator developed by RG Studios.</span>
          <h1>Grand Vitara</h1>
          <div class="price">Ex-Showroom Price* <strong>₹ 10.77 Lakh - ₹ 19.72 Lakh</strong></div>
          <div class="location">Delhi</div>
          <div class="actions">
            <button class="button primary">Pre Book</button>
            <button class="button secondary">Book A Test Ride</button>
          </div>
          <div class="bottom-panel">
            <span class="swatch-label">Color: ARTIC WHITE</span>
            <div class="swatch-grid" role="toolbar" aria-label="Color selection">
              <button class="swatch active" data-color="WHITE" aria-label="Artic White"></button>
              <button class="swatch" data-color="BLUE" aria-label="Nexa Blue"></button>
              <button class="swatch" data-color="RED" aria-label="Opulent Red"></button>
            </div>
          </div>
        </div>

        <div class="hero-visual">
          <img id="carImage" src="GV_WHITE0001.png" alt="Grand Vitara preview" draggable="false" loading="lazy" />
          <div class="drag-badge">Drag To Move</div>
        </div>
      </section>
    </div>

    <script>
      const swatches = Array.from(document.querySelectorAll(".swatch"));
      const image = document.getElementById("carImage");
      const heroVisual = document.querySelector(".hero-visual");
      const colorLabel = document.querySelector(".swatch-label");
      const colorMap = {
        RED: "RED",
        WHITE: "WHITE",
        BLUE: "BLUE",
      };
      const mobileBreakpoint = 760;
      function getAssetSuffix() {
        return window.innerWidth <= mobileBreakpoint ? '-mobile' : '';
      }
      const frameCounts = {
        RED: 11,
        WHITE: 12,
        BLUE: 12,
      };
      const displayNames = {
        RED: "Opulent Red",
        WHITE: "Artic White",
        BLUE: "Nexa Blue",
      };
      let currentColor = "WHITE";
      let frameIndex = 1;
      let isDragging = false;
      let dragStartX = 0;
      let dragFrame = 1;

      function setActiveColor(color) {
        currentColor = color;
        swatches.forEach((swatch) => {
          swatch.classList.toggle("active", swatch.dataset.color === color);
        });
        const maxFrame = frameCounts[currentColor] || 12;
        frameIndex = Math.min(frameIndex, maxFrame);
        dragFrame = 0;
        updateImage();
      }

      function moveFrame(offset) {
        const count = frameCounts[currentColor] || 12;
        let next = frameIndex + offset;
        next = next < 1 ? count : next > count ? 1 : next;
        frameIndex = next;
        updateImage();
      }

      function updateImage() {
        const zeroPadded = String(frameIndex).padStart(4, "0");
        const assetColor = colorMap[currentColor] || "RED";
        const suffix = getAssetSuffix();
        image.src = `GV_${assetColor}${zeroPadded}${suffix}.png`;
        image.alt = `Grand Vitara ${currentColor.toLowerCase()} preview`;
        colorLabel.textContent = `Color: ${displayNames[currentColor] || currentColor}`;
      }

      function startDrag(event) {
        isDragging = true;
        dragStartX = event.clientX;
        heroVisual.setPointerCapture(event.pointerId);
      }

      function onDrag(event) {
        if (!isDragging) return;
        const deltaX = event.clientX - dragStartX;
        const step = Math.floor(deltaX / 24);
        if (step !== dragFrame) {
          moveFrame(dragFrame - step);
          dragFrame = step;
        }
      }

      function endDrag(event) {
        if (!isDragging) return;
        isDragging = false;
        dragFrame = 0;
        heroVisual.releasePointerCapture(event.pointerId);
      }

      swatches.forEach((swatch) => {
        swatch.addEventListener("click", () => {
          setActiveColor(swatch.dataset.color);
        });
      });

      window.addEventListener("resize", () => {
        updateImage();
      });

      heroVisual.addEventListener("pointerdown", startDrag);
      heroVisual.addEventListener("pointermove", onDrag);
      heroVisual.addEventListener("pointerup", endDrag);
      heroVisual.addEventListener("pointercancel", endDrag);

      setActiveColor("WHITE");
    </script>
  </body>
</html>
